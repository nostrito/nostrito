<svg width="800" height="620" viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="2">nostrito — Architecture</text>

  <!-- ===== PUBLIC RELAYS BOX ===== -->
  <rect x="40" y="60" width="720" height="80" rx="12" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="82" text-anchor="middle" fill="#64748b" font-size="11" letter-spacing="3">NOSTR NETWORK (PUBLIC)</text>

  <!-- Relay pills -->
  <rect x="60" y="90" width="140" height="36" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="130" y="113" text-anchor="middle" fill="#94a3b8" font-size="12">relay.damus.io</text>

  <rect x="220" y="90" width="160" height="36" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="300" y="113" text-anchor="middle" fill="#94a3b8" font-size="12">relay.primal.net</text>

  <rect x="400" y="90" width="170" height="36" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="485" y="113" text-anchor="middle" fill="#94a3b8" font-size="12">relay.nostr.band</text>

  <rect x="590" y="90" width="150" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="665" y="113" text-anchor="middle" fill="#475569" font-size="12">+ hundreds more</text>

  <!-- Arrow down from relays to sync engine -->
  <line x1="400" y1="140" x2="400" y2="178" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="163" fill="#818cf8" font-size="10">pulls (outbox model)</text>

  <!-- ===== NOSTRITO DAEMON BOX ===== -->
  <rect x="40" y="180" width="720" height="370" rx="14" fill="url(#purpleGrad)" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="400" y="204" text-anchor="middle" fill="#a5b4fc" font-size="11" letter-spacing="3">nostrito daemon — YOUR MACHINE</text>

  <!-- Sync Engine -->
  <rect x="70" y="218" width="660" height="60" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="243" text-anchor="middle" fill="#c7d2fe" font-size="13" font-weight="600">Sync Engine</text>
  <text x="400" y="263" text-anchor="middle" fill="#818cf8" font-size="10">own events → discovery → content → threads → media</text>

  <!-- Arrow sync → wot -->
  <line x1="280" y1="278" x2="280" y2="308" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WoT Engine -->
  <rect x="70" y="310" width="310" height="60" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="225" y="335" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">WoT Engine</text>
  <text x="225" y="355" text-anchor="middle" fill="#a78bfa" font-size="10">trust scoring · follow graph BFS</text>

  <!-- SQLite -->
  <rect x="420" y="310" width="310" height="60" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="575" y="335" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="600">SQLite</text>
  <text x="575" y="355" text-anchor="middle" fill="#38bdf8" font-size="10">events · profiles · trust graph</text>

  <!-- Arrow sync → sqlite -->
  <line x1="520" y1="278" x2="520" y2="308" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Blossom Storage -->
  <rect x="420" y="400" width="310" height="60" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="575" y="425" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">Blossom Storage</text>
  <text x="575" y="445" text-anchor="middle" fill="#fbbf24" font-size="10">images · videos · attachments</text>

  <!-- Arrow SQLite → Blossom -->
  <line x1="575" y1="370" x2="575" y2="398" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Relay Server -->
  <rect x="70" y="400" width="310" height="60" rx="10" fill="#064e3b" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
  <text x="225" y="425" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">NIP-01 Relay Server</text>
  <text x="225" y="445" text-anchor="middle" fill="#4ade80" font-size="11">wss://localhost:4869</text>

  <!-- Arrow WoT → Relay -->
  <line x1="225" y1="370" x2="225" y2="398" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow SQLite → Relay (horizontal) -->
  <line x1="420" y1="430" x2="382" y2="430" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== CLIENTS ===== -->
  <!-- Arrow down from relay to clients -->
  <line x1="225" y1="461" x2="225" y2="500" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="245" y="488" fill="#4ade80" font-size="10">local WebSocket</text>

  <!-- Client boxes -->
  <rect x="40" y="502" width="160" height="44" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="529" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Damus</text>

  <rect x="220" y="502" width="160" height="44" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="300" y="529" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Amethyst</text>

  <rect x="400" y="502" width="160" height="44" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="480" y="529" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Snort</text>

  <rect x="580" y="502" width="180" height="44" rx="10" fill="#1e1e1e" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="670" y="529" text-anchor="middle" fill="#475569" font-size="13">any Nostr client</text>

  <!-- Lines from relay to all clients -->
  <line x1="225" y1="500" x2="120" y2="500" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="225" y1="500" x2="300" y2="500" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="225" y1="500" x2="480" y2="500" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="225" y1="500" x2="670" y2="500" stroke="#334155" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="120" y1="500" x2="120" y2="502" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="300" y1="500" x2="300" y2="502" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="480" y1="500" x2="480" y2="502" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="670" y1="500" x2="670" y2="502" stroke="#334155" stroke-width="1.5"/>

  <!-- Footer -->
  <text x="400" y="600" text-anchor="middle" fill="#1e293b" font-size="10">nostrito.com</text>
</svg>